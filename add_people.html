<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>إضافة الأشخاص</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      body {
        font-family: Arial;
        padding: 30px;
      }

      textarea {
        width: 100%;
        height: 250px;
        font-size: 16px;
        padding: 10px;
      }

      button {
        padding: 12px 30px;
        margin: 10px 0;
        font-size: 18px;
        cursor: pointer;
      }

      .person {
        border: 1px solid #aaa;
        padding: 15px;
        margin: 10px 0;
        background: #f5f5f5;
      }

      #preview {
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <h2>إضافة الأشخاص</h2>

    <h3>1- لصق بيانات واتساب</h3>

    <textarea id="input"></textarea>

    <br />

    <button onclick="convertData()">تحويل</button>

    <h3>2- مراجعة البيانات</h3>

    <div id="preview"></div>

    <button onclick="sendData()">إرسال إلى قاعدة البيانات</button>

    <script>
      const SUPABASE_URL = "https://qklrqulxfhotrvusvhdk.supabase.co";
      const SUPABASE_KEY = "sb_publishable_FwAsOKVUOagNHw3426fZlw_W_r3ubEj";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

      let people = [];

      function cleanWhatsappLine(line) {
        let index = line.lastIndexOf(":");

        if (index !== -1) {
          line = line.substring(index + 1);
        }

        return line.trim();
      }

      function detectType(value) {
        if (/^[A-Za-z]\d{7,9}$/.test(value)) {
          return "passport";
        }

        if (/^\d{8,9}$/.test(value)) {
          return "passport";
        }

        if (/^\d{10,12}$/.test(value)) {
          return "national_id";
        }

        if (/^\d{6,8}$/.test(value)) {
          return "car_number";
        }

        return "name";
      }

      function parsePeople(text) {
        let lines = text
          .split("\n")
          .map(cleanWhatsappLine)
          .filter(x => x);

        let result = [];

        for (let i = 0; i < lines.length; i += 4) {
          let group = lines.slice(i, i + 4);

          if (group.length !== 4) {
            continue;
          }

          let person = {
            name: "",
            passport: "",
            national_id: "",
            car_number: ""
          };

          group.forEach(value => {
            let type = detectType(value);
            person[type] = value;
          });

          if (person.name && person.national_id) {
            result.push(person);
          }
        }

        return result;
      }

      function convertData() {
        let text = document.getElementById("input").value;
        people = parsePeople(text);
        showPreview();
      }

      function showPreview() {
        let html = "";

        people.forEach((p, index) => {
          html += `
            <div class="person">
              <b>الشخص ${index + 1}</b>
              <br /><br />
              الاسم:
              ${p.name}
              <br />
              الجواز:
              ${p.passport}
              <br />
              الرقم الوطني:
              ${p.national_id}
              <br />
              رقم السيارة:
              ${p.car_number}
            </div>
          `;
        });

        document.getElementById("preview").innerHTML = html;
      }

      async function sendData() {
        if (people.length === 0) {
          alert("لا توجد بيانات للإرسال");
          return;
        }

        const { data, error } = await supabaseClient.rpc("add_people_batch", {
          people_data: people
        });

        if (error) {
          alert(error.message);
          return;
        }

        alert("تمت الإضافة: " + data.added + "\nالموجود مسبقاً: " + data.exists);
      }
    </script>
  </body>
</html>
