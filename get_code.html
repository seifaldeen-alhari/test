<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>جلب الكود</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      body {
        font-family: Arial;
        padding: 30px;
      }

      input {
        width: 100%;
        padding: 12px;
        font-size: 18px;
      }

      button {
        margin-top: 15px;
        padding: 12px 30px;
        font-size: 18px;
        cursor: pointer;
      }

      #result {
        margin-top: 25px;
        font-size: 20px;
        white-space: pre-line;
      }
    </style>
  </head>

  <body>
    <h2>جلب الكود</h2>

    <input id="phone" placeholder="أدخل رقم الهاتف" />

    <button onclick="getCode()">بحث</button>

    <div id="result"></div>

    <script>
      const SUPABASE_URL = "https://qklrqulxfhotrvusvhdk.supabase.co";
      const SUPABASE_KEY = "sb_publishable_FwAsOKVUOagNHw3426fZlw_W_r3ubEj";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

      let realtimeChannel = null;

      async function getCode() {
        let phone = document.getElementById("phone").value.trim();

        if (!phone) {
          show("أدخل رقم الهاتف");
          return;
        }

        show("جاري البحث...");

        const { data, error } = await supabaseClient.rpc("get_code_by_phone", {
          phone_value: phone
        });

        if (error) {
          show(error.message);
          return;
        }

        if (data.status === "ready") {
          show("الاسم: " + data.name + "\n\nالكود: " + data.code);
          return;
        }

        if (data.status === "not_found") {
          show("رقم الهاتف غير موجود");
          return;
        }

        if (data.status === "waiting") {
          show("تم العثور على الشخص\nبانتظار وصول الكود...");
          startRealtime(data.id);
        }
      }

      function startRealtime(id) {
        if (realtimeChannel) {
          supabaseClient.removeChannel(realtimeChannel);
        }

        realtimeChannel = supabaseClient
          .channel("code-wait-" + id)
          .on(
            "postgres_changes",
            {
              event: "UPDATE",
              schema: "public",
              table: "people",
              filter: "id=eq." + id
            },
            payload => {
              let newData = payload.new;

              if (newData.code) {
                show("تم وصول الكود\n\nالكود: " + newData.code);
                supabaseClient.removeChannel(realtimeChannel);
              }
            }
          )
          .subscribe();
      }

      function show(text) {
        document.getElementById("result").innerText = text;
      }
    </script>
  </body>
</html>
