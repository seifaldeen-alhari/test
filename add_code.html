<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>إضافة كود</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        font-size: 18px;
        margin-bottom: 15px;
      }

      textarea {
        height: 120px;
      }

      button {
        padding: 12px 30px;
        font-size: 18px;
        cursor: pointer;
      }

      #result {
        margin-top: 20px;
        white-space: pre-line;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <h2>إضافة كود</h2>

    <label>أرقام الهواتف</label>

    <textarea id="phones" placeholder="
رقم واحد:

789456123

أو رقمين:

789456123
755555555
"></textarea>

    <label>الكود</label>

    <input id="code" placeholder="مثال: tpZwH797" />

    <button onclick="assignCode()">إضافة</button>

    <div id="result"></div>

    <script>
      const SUPABASE_URL = "https://qklrqulxfhotrvusvhdk.supabase.co";
      const SUPABASE_KEY = "sb_publishable_FwAsOKVUOagNHw3426fZlw_W_r3ubEj";

      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

      function parsePhones(text) {
        return text
          .split("\n")
          .map(x => x.trim())
          .filter(x => x);
      }

      async function assignCode() {
        let phones = parsePhones(document.getElementById("phones").value);
        let code = document.getElementById("code").value.trim();

        if (phones.length === 0) {
          document.getElementById("result").innerText = "لم يتم إدخال رقم هاتف";
          return;
        }

        if (!code) {
          document.getElementById("result").innerText = "لم يتم إدخال الكود";
          return;
        }

        const { data, error } = await supabaseClient.rpc("assign_code", {
          phones: phones,
          code_value: code
        });

        if (error) {
          document.getElementById("result").innerText = "خطأ:\n" + error.message;
          return;
        }

        let message = "";

        if (data.status === "added") {
          message = "تمت إضافة الكود بنجاح";
        } else if (data.status === "phone_not_found") {
          message = "رقم الهاتف غير موجود";
        } else if (data.status === "no_match") {
          message = "لم يتم العثور على تطابق للرقمين الأخيرين";
        } else if (data.status === "invalid_code") {
          message = "الكود غير صالح";
        } else {
          message = JSON.stringify(data, null, 2);
        }

        document.getElementById("result").innerText = message;
      }
    </script>
  </body>
</html>
